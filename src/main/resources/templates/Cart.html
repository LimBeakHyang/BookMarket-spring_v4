<html>
<head>
    <!-- 한글 깨짐 방지를 위한 문자 인코딩 설정 -->
    <meta charset="UTF-8">

    <!-- 브라우저 탭에 표시될 제목 -->
    <title>장바구니</title>

    <!-- 부트스트랩 CSS 파일 연결 -->
    <link href="/bookmarket/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<!-- 전체 화면 여백을 주는 컨테이너 -->
<div class="container py-4">

    <!-- 상단 헤더 영역 -->
    <header class="py-3 mb-4 border-bottom">
        <div class="container d-flex flex-wrap justify-content-center">

            <!-- 홈으로 이동하는 로고 링크 -->
            <a href="/bookmarket/home"
               class="d-flex align-items-center link-body-emphasis text-body-emphasis text-decoration-none mb-3 mb-lg-0 me-lg-auto">

                <!-- 책 모양 SVG 아이콘 -->
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"
                     fill="currentColor" class="bi bi-book-half me-2" viewBox="0 0 16 16">
                    <path d="M8.5 2.687c.654-.689 1.782-.886 3.112-.752 1.234.124 2.503.523 3.388.893v9.923c-.918-.35-2.107-.692-3.287-.81-1.094-.111-2.278-.039-3.213.492zM8 1.783C7.015.936 5.587.81 4.287.94c-1.514.153-3.042.672-3.994 1.105A.5.5 0 0 0 0 2.5v11a.5.5 0 0 0 .707.455c.882-.4 2.303-.881 3.68-1.02 1.409-.142 2.59.087 3.223.877a.5.5 0 0 0 .78 0c.633-.79 1.814-1.019 3.222-.877 1.378.139 2.8.62 3.681 1.02A.5.5 0 0 0 16 13.5v-11a.5.5 0 0 0-.293-.455c-.952-.433-2.48-.952-3.994-1.105C10.413.809 8.985.936 8 1.783"/>
                </svg>

                <!-- 사이트 이름 -->
                <span class="fs-4">BookMarket</span>
            </a>
        </div>
    </header>

    <!-- 장바구니 제목 영역 -->
    <div class="p-5 mb-4 bg-body-tertiary rounded-3">
        <div class="container-fluid py-5">
            <!-- 페이지 메인 제목 -->
            <h1 class="display-5 fw-bold">장바구니</h1>

            <!-- 서브 설명 문구 -->
            <p class="col-md-8 fs-4">BookMarket</p>
        </div>
    </div>

    <!-- 본문 영역 -->
    <div class="row align-items-md-stretch">

        <!-- 주문하기 버튼 영역 -->
        <div class="col-md-12">
            <a href="#" class="btn btn-success text-right" style="float:right">주문하기</a>
        </div>

        <!-- 표와 총액 영역 위쪽 여백 -->
        <div style="padding-top: 50px">

            <!-- 장바구니 목록 테이블 -->
            <table class="table table-hover">
                <tr>
                    <!-- 표 헤더 -->
                    <th>도서</th>
                    <th>가격</th>
                    <th>수량</th>
                    <th>소계</th>
                    <th>비고</th>
                    <th></th>
                </tr>

                <!-- cart 객체가 null이 아닐 때만 아래 내용 출력 -->
                <div th:if="${cart != null}">

                    <!-- cart 안의 cartItems를 반복하면서 item 변수에 하나씩 담음 -->
                    <div th:each="item:${cart.cartItems}">
                        <tr>

                            <!-- 도서 ID와 도서명을 출력 -->
                            <td th:text="${item.value.book.bookId} + '-' + ${item.value.book.name}">X</td>

                            <!-- 예제 원문상 동일하게 되어 있음
                                 아마 실제로는 가격이 와야 할 가능성이 큼 -->
                            <td th:text="${item.value.book.bookId} + '-' + ${item.value.book.name}">X</td>

                            <!-- 도서 가격 출력 -->
                            <td th:text="${item.value.book.unitPrice}">X</td>

                            <!-- 장바구니에 담긴 수량 출력 -->
                            <td th:text="${item.value.quantity}">X</td>

                            <!-- 항목별 소계(총 가격) 출력 -->
                            <td th:text="${item.value.totalPrice}">X</td>

                            <!-- 비고 또는 삭제 버튼 등이 들어갈 자리 -->
                            <td>X</td>
                        </tr>
                    </div>
                </div>
            </table>

            <!-- 총액 표시 영역 -->
            <div class="text-end" style="padding-right:30px">
                <b>총액
                    <!-- cart가 null이 아닐 때 총액 출력 -->
                    <span th:if="${cart != null}">
                        [[${cart.grandTotal}]]
                    </span>
                </b>
            </div>

            <br>

            <!-- 도서 목록 페이지로 돌아가는 버튼 -->
            <a href="/bookmarket/books" class="btn btn-secondary">&laquo;쇼핑 계속하기</a>

            <!-- 하단 푸터 -->
            <footer class="pt-3 mt-4 text-body-secondary border-top">
                <span class="text-body-secondary">&copy;BookMarket</span>
            </footer>
        </div>
    </div>
</div>
</body>
</html>
